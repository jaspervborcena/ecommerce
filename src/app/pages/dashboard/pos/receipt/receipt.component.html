<!-- Receipt Modal -->
<div 
  *ngIf="isVisible" 
  class="receipt-modal-overlay"
  (keydown.enter)="onPrintReceipt()">
  
  <div 
    class="receipt-modal-content"
    (click)="onModalContentClick($event)">
    
    <!-- Modal Header with Close Button -->
    <div class="modal-header">
      <h2>Printer Receipt Preview</h2>
      <button 
        class="close-btn"
        (click)="onCloseModal()"
        type="button">
        ×
      </button>
    </div>

    <!-- Receipt Content - Clean Receipt Preview -->
    <div class="receipt-container">
      <div class="escpos-commands-display" style="padding: 16px; background: #f9f9f9; border-radius: 4px;">

        <pre [innerHTML]="formatPrinterPreviewHtml()" style="white-space: pre-wrap; word-wrap: break-word; background: #fff; padding: 16px; border: 1px solid #ddd; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.6; font-weight: 500;"></pre>

      </div>
    </div>

    <!-- Print Options -->
  <!-- Print Options Removed for Cleanup -->

    <!-- Modal Actions -->
    <div class="modal-actions">
      <button 
        class="btn-secondary"
        (click)="onCloseModal()">
        Close
      </button>
      <button 
        class="btn-primary"
        #printBtn
        autofocus
        (click)="onPrintReceipt()"
        [disabled]="isPrinting">
        <span *ngIf="!isPrinting">Print Receipt</span>
        <span *ngIf="isPrinting">Saving & Printing...</span>
      </button>
    </div>

  </div>
</div>
